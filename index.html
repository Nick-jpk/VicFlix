<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VicFlix - Movies & Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #141414;
            color: white;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            color: #e50914;
            font-weight: bold;
            cursor: pointer;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .nav a:hover {
            background: #e50914;
        }

        .search-bar {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.15);
            color: white;
            width: 250px;
        }

        .search-bar:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            background: #e50914;
            color: white;
        }

        .btn-secondary {
            background: #333;
        }

        /* Hero Section */
        .hero {
            height: 350px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1920') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #e5e5e5;
            margin-bottom: 20px;
        }

        .hero-search {
            display: flex;
            max-width: 600px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid #444;
        }

        .hero-search input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .hero-search button {
            padding: 10px 25px;
            border-radius: 50px;
            background: #e50914;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Main Content */
        .section {
            padding: 30px 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 24px;
            border-left: 4px solid #e50914;
            padding-left: 15px;
        }

        .api-source {
            color: #1db954;
            font-size: 13px;
            background: rgba(29,185,84,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 6px 16px;
            border-radius: 20px;
            background: #2a2a2a;
            color: white;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid #444;
        }

        .filter-tab:hover,
        .filter-tab.active {
            background: #e50914;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .movie-card {
            cursor: pointer;
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
        }

        .movie-card .title {
            margin-top: 8px;
            font-weight: 600;
        }

        .movie-card .year {
            color: #aaa;
            font-size: 13px;
        }

        .song-card {
            background: #1f1f1f;
            padding: 15px;
            border-radius: 8px;
        }

        .song-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .song-card .song-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .song-card .artist {
            color: #1db954;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .song-card audio {
            width: 100%;
            height: 36px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #e50914;
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #000;
            margin-top: 40px;
            color: #777;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px;
            }

            .nav {
                width: 100%;
                justify-content: center;
            }

            .search-bar {
                width: 100%;
            }

            .hero {
                padding: 20px;
                height: auto;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero-search {
                flex-direction: column;
                background: transparent;
            }

            .hero-search input {
                background: rgba(0,0,0,0.6);
                border-radius: 50px;
                margin-bottom: 10px;
            }

            .section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="window.location.reload()">VICFLIX</div>
    <div class="nav">
        <a href="#" onclick="loadMovies()">Movies</a>
        <a href="#" onclick="loadMusic()">Music</a>
        <input type="text" class="search-bar" id="searchInput" placeholder="Search movies..." onkeypress="handleSearch(event)">
        <div class="auth-buttons">
            <button class="btn" onclick="showLoginModal()">Login</button>
            <button class="btn btn-secondary" onclick="showRegisterModal()">Register</button>
        </div>
    </div>
</header>

<div class="hero">
    <h1>Search Movies & Music</h1>
    <p>Try searching: "Inception", "The Weeknd", "action", "pop", "Bollywood"</p>
    <div class="hero-search">
        <input type="text" id="heroSearchInput" placeholder="What do you want to search?" onkeypress="handleHeroSearch(event)">
        <button onclick="performSearch()">Search</button>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <h2 id="sectionTitle">Popular Movies</h2>
        <span class="api-source" id="apiSource">Live from TMDB</span>
    </div>
    
    <div class="filter-tabs">
        <span class="filter-tab active" onclick="loadMovies()">Popular Movies</span>
        <span class="filter-tab" onclick="loadNowPlaying()">Now Playing</span>
        <span class="filter-tab" onclick="loadTopRated()">Top Rated</span>
        <span class="filter-tab" onclick="loadTrendingMusic()">Trending Songs</span>
        <span class="filter-tab" onclick="loadRockMusic()">Rock Music</span>
        <span class="filter-tab" onclick="loadPopMusic()">Pop Music</span>
    </div>
    
    <div class="content-grid" id="contentGrid">
        <div class="loading">Loading from TMDB API...</div>
    </div>
</div>

<!-- Simple Login Modal -->
<div id="loginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center;">
    <div style="background: #1f1f1f; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px;">
        <h3 style="margin-bottom: 20px;">Login</h3>
        <input type="text" id="loginUsername" placeholder="Username" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white;">
        <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #333; border: 1px solid #444; color: white;">
        <button class="btn" onclick="login()" style="width: 100%; margin-bottom: 10px;">Login</button>
        <button class="btn btn-secondary" onclick="hideModal('loginModal')" style="width: 100%;">Cancel</button>
    </div>
</div>

<footer>
    <p>© 2024 VicFlix - Movies & Music Search</p>
</footer>

<script>
    const TMDB_API_KEY = '5e3b7c3d5a5e5b7c3d5a5e5b7c3d5a5e';
    const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
    const DEEZER_API = 'https://api.deezer.com';

    window.onload = function() {
        loadMovies();
    };

    // ============ MOVIE FUNCTIONS ============
    async function loadMovies() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Popular Movies';
        document.getElementById('apiSource').textContent = 'Live from TMDB';
        updateActiveTab('Popular Movies');

        try {
            const response = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}`);
            const data = await response.json();
            displayMovies(data.results.slice(0, 20));
        } catch (error) {
            showError('Failed to load movies');
        }
    }

    async function loadNowPlaying() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Now Playing';
        updateActiveTab('Now Playing');

        try {
            const response = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${TMDB_API_KEY}`);
            const data = await response.json();
            displayMovies(data.results.slice(0, 20));
        } catch (error) {
            loadMovies();
        }
    }

    async function loadTopRated() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Top Rated';
        updateActiveTab('Top Rated');

        try {
            const response = await fetch(`https://api.themoviedb.org/3/movie/top_rated?api_key=${TMDB_API_KEY}`);
            const data = await response.json();
            displayMovies(data.results.slice(0, 20));
        } catch (error) {
            loadMovies();
        }
    }

    function displayMovies(movies) {
        const grid = document.getElementById('contentGrid');
        let html = '';

        movies.forEach(movie => {
            html += `
                <div class="movie-card" onclick="playTrailer('${movie.title.replace(/'/g, "\\'")}')">
                    <img src="${TMDB_IMAGE_BASE}${movie.poster_path}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                    <div class="title">${movie.title}</div>
                    <div class="year">${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</div>
                </div>
            `;
        });

        grid.innerHTML = html;
    }

    // ============ MUSIC FUNCTIONS ============
    async function loadTrendingMusic() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Trending Songs';
        document.getElementById('apiSource').textContent = 'Live from Deezer';
        updateActiveTab('Trending Songs');

        try {
            const response = await fetch(`${DEEZER_API}/chart/0/tracks`);
            const data = await response.json();
            displayMusic(data.data.slice(0, 20));
        } catch (error) {
            showError('Failed to load music');
        }
    }

    async function loadRockMusic() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Rock Music';
        updateActiveTab('Rock Music');

        try {
            const response = await fetch(`${DEEZER_API}/search?q=rock&limit=20`);
            const data = await response.json();
            displayMusic(data.data);
        } catch (error) {
            loadTrendingMusic();
        }
    }

    async function loadPopMusic() {
        showLoading();
        document.getElementById('sectionTitle').textContent = 'Pop Music';
        updateActiveTab('Pop Music');

        try {
            const response = await fetch(`${DEEZER_API}/search?q=pop&limit=20`);
            const data = await response.json();
            displayMusic(data.data);
        } catch (error) {
            loadTrendingMusic();
        }
    }

    function loadMusic() {
        loadTrendingMusic();
    }

    function displayMusic(tracks) {
        const grid = document.getElementById('contentGrid');
        let html = '';

        tracks.forEach(track => {
            html += `
                <div class="song-card">
                    <img src="${track.album.cover_medium}" alt="${track.title}">
                    <div class="song-title">${track.title}</div>
                    <div class="artist">${track.artist.name}</div>
                    <audio controls preload="none">
                        <source src="${track.preview}" type="audio/mpeg">
                    </audio>
                </div>
            `;
        });

        grid.innerHTML = html;
    }

    // ============ SEARCH ============
    function handleSearch(event) {
        if (event.key === 'Enter') {
            document.getElementById('heroSearchInput').value = event.target.value;
            performSearch();
        }
    }

    function handleHeroSearch(event) {
        if (event.key === 'Enter') {
            performSearch();
        }
    }

    async function performSearch() {
        const query = document.getElementById('heroSearchInput').value.trim();
        if (!query) return;

        showLoading();
        document.getElementById('sectionTitle').textContent = `Search: "${query}"`;
        document.getElementById('apiSource').textContent = 'TMDB + Deezer';

        try {
            const [moviesRes, musicRes] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`),
                fetch(`${DEEZER_API}/search?q=${encodeURIComponent(query)}&limit=10`)
            ]);

            const moviesData = await moviesRes.json();
            const musicData = await musicRes.json();

            const grid = document.getElementById('contentGrid');
            let html = '';

            moviesData.results.slice(0, 10).forEach(movie => {
                html += `
                    <div class="movie-card" onclick="playTrailer('${movie.title.replace(/'/g, "\\'")}')">
                        <img src="${TMDB_IMAGE_BASE}${movie.poster_path}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                        <div class="title">${movie.title}</div>
                        <div class="year">${movie.release_date ? movie.release_date.split('-')[0] : 'N/A'}</div>
                    </div>
                `;
            });

            if (musicData.data) {
                musicData.data.slice(0, 10).forEach(track => {
                    html += `
                        <div class="song-card">
                            <img src="${track.album.cover_medium}" alt="${track.title}">
                            <div class="song-title">${track.title}</div>
                            <div class="artist">${track.artist.name}</div>
                            <audio controls preload="none">
                                <source src="${track.preview}" type="audio/mpeg">
                            </audio>
                        </div>
                    `;
                });
            }

            grid.innerHTML = html || '<div class="no-results">No results found</div>';
        } catch (error) {
            showError('Search failed');
        }
    }

    function playTrailer(title) {
        window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(title + ' trailer')}`, '_blank');
    }

    // ============ UI HELPERS ============
    function showLoading() {
        document.getElementById('contentGrid').innerHTML = '<div class="loading">Loading...</div>';
    }

    function showError(message) {
        document.getElementById('contentGrid').innerHTML = `<div class="no-results">❌ ${message}</div>`;
    }

    function updateActiveTab(tabName) {
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('active');
            if (tab.textContent.includes(tabName)) {
                tab.classList.add('active');
            }
        });
    }

    // ============ MODAL FUNCTIONS ============
    function showLoginModal() {
        document.getElementById('loginModal').style.display = 'flex';
    }

    function hideModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function login() {
        alert('Login functionality would connect to your backend');
        hideModal('loginModal');
    }

    function showRegisterModal() {
        alert('Registration would connect to your backend');
    }
</script>
</body>
</html>
